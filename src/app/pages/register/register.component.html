<div class="auth-container">
  <h2>Registrati</h2>
  <form (ngSubmit)="register()" #registerForm="ngForm">

    <!-- Griglia 2 colonne -->
    <div class="form-row">
      <input type="text" name="nome" [(ngModel)]="nome" placeholder="Nome" required />
      <input type="text" name="cognome" [(ngModel)]="cognome" placeholder="Cognome" required />
    </div>

    <div class="form-row">
      <input type="email" name="email" [(ngModel)]="email" placeholder="Email" required />
      <input type="password" name="password" [(ngModel)]="password" placeholder="Password" required />
    </div>

    <div class="form-row">
      <input type="number" name="eta" [(ngModel)]="eta" placeholder="Età" />
      <select name="sesso" [(ngModel)]="sesso" required>
        <option value="" disabled>Seleziona sesso</option>
        <option value="M">Maschile</option>
        <option value="F">Femminile</option>
        <option value="Altro">Altro</option>
      </select>

    </div>

    <div class="form-row">
      <input type="number" name="altezza" [(ngModel)]="altezza" placeholder="Altezza (cm)" />
      <input type="number" name="peso" [(ngModel)]="peso" placeholder="Peso (kg)" />
    </div>

    <div class="form-row">
      <select name="obiettivo" [(ngModel)]="obiettivo" required>
        <option value="" disabled>Obiettivo fitness</option>
        <option value="dimagrimento">Dimagrimento</option>
        <option value="massa">Massa muscolare</option>
        <option value="resistenza">Resistenza</option>
        <option value="generale">Generale</option>
      </select>
      <select name="livello" [(ngModel)]="livello" required>
        <option value="" disabled>Livello</option>
        <option value="principiante">Principiante</option>
        <option value="intermedio">Intermedio</option>
        <option value="avanzato">Avanzato</option>
      </select>
    </div>

    <input type="date" name="dataNascita" [(ngModel)]="dataNascita" placeholder="Data di nascita" />
    <textarea name="note" [(ngModel)]="note" placeholder="Note personali"></textarea>

    <button type="submit">Registrati</button>
    <a routerLink="/login">Hai già un account? Accedi</a>

    <p class="error" *ngIf="error">{{ error }}</p>
  </form>
</div>

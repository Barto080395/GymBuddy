<div class="container">
    @if (deletable) {
      <button
        class="delete-btn"
        (click)="handleDelete()"
        appCursor="pointer"
      >
        ×
      </button>
    }
  
    @if (skill.icon) {
      <div class="icon">{{ skill.icon }}</div>
    }
  
    <svg width="100" height="100">
      <circle
        stroke="rgba(255,255,255,0.1)"
        fill="transparent"
        stroke-width="8"
        [attr.r]="radius"
        cx="50"
        cy="50"
      ></circle>
      <circle
        [attr.stroke]="color"
        fill="transparent"
        stroke-width="8"
        [attr.r]="radius"
        cx="50"
        cy="50"
        [attr.stroke-dasharray]="circumference"
        [attr.stroke-dashoffset]="offset"
        stroke-linecap="round"
      ></circle>
      <text
        x="50%"
        y="50%"
        text-anchor="middle"
        dy=".3em"
        font-size="20"
        fill="white"
        font-weight="bold"
      >
        {{ skill.percent }}%
      </text>
    </svg>
  
    <div class="skill-info">
      <div class="skill-name">{{ skill.name }}</div>
      <div class="skill-bar-container">
        <div
          class="skill-bar"
          [style.width.%]="animated ? skill.percent : 0"
          [style.background]="color"
        ></div>
      </div>
    </div>
  </div>

<div class="countdown-container">
  <ng-container *ngIf="!finished; else finishedTemplate">
    <p class="status">Serie {{ currentSet }} / {{ sets }}</p>
    <p class="status" *ngIf="!isRest">
      💪 In corso: {{ minutes < 10 ? '0' + minutes : minutes }}:{{ seconds < 10 ? '0' + seconds : seconds }}
    </p>
    <p class="status" *ngIf="isRest">
      ⏱ Recupero: {{ minutes < 10 ? '0' + minutes : minutes }}:{{ seconds < 10 ? '0' + seconds : seconds }}
    </p>

    <div class="controls">

      <!-- PAUSE -->
      <button *ngIf="!isPaused" (click)="pause()" class="control-btn">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="currentColor">
          <path d="M6 5h4v14H6zm8 0h4v14h-4z"/>
        </svg>
      </button>
    
      <!-- RESUME -->
      <button *ngIf="isPaused" (click)="resume()" class="control-btn">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="currentColor">
          <path d="M8 5v14l11-7z"/>
        </svg>
      </button>
    
      <!-- STOP -->
      <button (click)="stop()" class="control-btn">
        <img src="assets/icons/stop.png" alt="stop" class="stop-icon" />
      </button>
    
    </div>
  </ng-container>

  <ng-template #finishedTemplate>
    <div class="finished-row">
      <img src="assets/icons/approved.png" alt="approved" class="approved-icon" />
      <button class="reload-button" (click)="resetExercise()">
        <svg
          width="24"
          height="24"
          viewBox="0 0 24 24"
          fill="none"
          xmlns="http://www.w3.org/2000/svg"
        >
          <path
            d="M12 4V1L8 5l4 4V6c3.31 0 6 2.69 6 6 0 1.06-.27 2.06-.74 2.92l1.46 1.46C19.08 14.47 20 13.3 20 12c0-4.42-3.58-8-8-8zm-6.72.58L3.82 6.24C3.31 7.53 3 9.21 3 12c0 4.42 3.58 8 8 8v3l4-4-4-4v3c-3.31 0-6-2.69-6-6 0-1.06.27-2.06.74-2.92z"
            fill="currentColor"
          />
        </svg>
      </button>
    </div>
  </ng-template>
</div>
